<style>
    :root {
        --bg-dark: #0a0a0a;          /* Deep charcoal background */
        --card-bg: #171717;          /* Lighter charcoal for cards */
        --text-main: #f5f5f5;        /* Off-white text */
        --text-muted: #a3a3a3;       /* Subtle grey text */
        --accent: #ffffff;           /* Crisp white for highlights */
        --border: #333333;           /* Dark borders */
    }

    body { 
        font-family: 'Inter', sans-serif; 
        line-height: 1.6; 
        color: var(--text-main); 
        background-color: var(--bg-dark); 
        margin: 0; 
        padding: 0; 
    }

    header { 
        background: var(--bg-dark); 
        padding: 80px 20px; 
        text-align: center; 
        border-bottom: 1px solid var(--border); 
    }

    h1 { margin: 0; font-size: 2.5rem; color: var(--accent); }
    
    .container { max-width: 800px; margin: 40px auto; padding: 0 20px; }

    .project { 
        background: var(--card-bg); 
        padding: 40px; 
        margin-bottom: 30px; 
        border-radius: 12px; 
        border: 1px solid var(--border);
    }

    .project h3 { margin-top: 0; color: var(--accent); }
    
    a { 
        display: inline-block; 
        background: transparent; 
        color: var(--accent); 
        border: 1px solid var(--accent);
        padding: 10px 20px; 
        text-decoration: none; 
        border-radius: 6px; 
        margin-top: 20px; 
        transition: 0.3s;
    }

    a:hover { background: var(--accent); color: var(--bg-dark); }
</style>
